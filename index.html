<!DOCTYPE html>
<html>
<head>
    <title>Secure-accounts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #f7f9fc;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e1e8ed;
        }
        .warning-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .header h2 {
            color: #e74c3c;
            font-size: 20px;
        }
        .header p {
            color: #657786;
            font-size: 14px;
            margin-top: 8px;
        }
        .content {
            padding: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #14171a;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #357abd;
        }
        .security-badge {
            background: #f0f3f7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #657786;
        }
        .footer {
            background: #f7f9fc;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #8899a6;
            border-top: 1px solid #e1e8ed;
        }
        .warning-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="warning-icon"></div>
                <h2>Security Alert: Unusual Sign-In Activity</h2>
                <p>We've detected a suspicious login attempt to your account</p>
            </div>
            <div class="content">
                <form action="/login" method="POST">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="input-group">
                        <label> Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group" id="totpGroup" style="display: none;">
                        <label> Two-Factor Authentication Code</label>
                        <input type="text" name="totp" placeholder="Enter 6-digit code" maxlength="6">
                    </div>
                    <button type="submit">Secure Account & Verify Identity</button>
                </form>
                <div class="security-badge">
                     Protected by industry-standard encryption
                </div>
            </div>
            <div class="footer">
                This security check helps protect your account from unauthorized access
            </div>
        </div>
    </div>

    <script>
        // This simulates how real phishing pages might dynamically show/hide fields
        // In a real attack, they might ask for 2FA after getting password
        let clickCount = 0;
        document.querySelector('form').addEventListener('click', function(e) {
            clickCount++;
            if(clickCount === 3) {
                document.getElementById('totpGroup').style.display = 'block';
            }
        });
    </script>
</body>
</html>
